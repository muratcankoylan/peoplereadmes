name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Schema validation
        run: uv run peoplereadme validate
      - name: Tests
        run: uv run pytest -q
